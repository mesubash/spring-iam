spring:
  application:
    name: iam-service
  jackson:
    deserialization:
      accept-single-value-as-array: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iam_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: IAM-HikariPool

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}  # Use Flyway for schema; override to validate if needed
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms
      timeout: 2000ms

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes default
      cache-null-values: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        authorization.check.duration: true
  prometheus:
    metrics:
      export:
        enabled: true

# Application-Specific Configuration
iam:
  authorization:
    # Cache TTL settings
    cache:
      permissions-ttl: 300  # 5 minutes
      deny-rules-ttl: 60    # 1 minute (security-critical)
      scope-ttl: 3600       # 1 hour (changes rarely)
      role-ttl: 1800        # 30 minutes

    # Audit settings
    audit:
      async: true
      batch-size: 100
      flush-interval: 5000  # 5 seconds

  audit:
    partitioning:
      enabled: true
      create-ahead-months: 2
      timezone: UTC
      cron: "0 15 0 * * *"
    retention:
      enabled: true
      months: 24
      action: DROP
      cron: "0 30 1 * * *"

    # Performance settings
    performance:
      max-authorization-time-ms: 50  # Log warning if exceeded
      enable-metrics: true

  account:
    lockout:
      max-attempts: 5
      lockout-duration-minutes: 30

  rate-limit:
    max-requests: 10        # per IP per endpoint per window
    window-seconds: 60      # sliding window

  security:
    # If empty, API key check is disabled
    internal-api-key: ${IAM_INTERNAL_API_KEY:}
    jwt:
      # If empty, JWT auth is disabled
      secret: ${IAM_JWT_SECRET:}
      issuer: ${IAM_JWT_ISSUER:}
      audience: ${IAM_JWT_AUDIENCE:}

# AuthN Configuration
app:
  jwt:
    secret: ${APP_JWT_SECRET:changeThisToALongRandomSecretKeyForProduction}
    expiration: 900000                   # 15 minutes (maps to JwtConfig.expiration)
    refresh-expiration: 604800000        # 7 days    (maps to JwtConfig.refreshExpiration)
    refresh-token-cookie-name: __Host-Session-Id
    refresh-token-expiration-days: 7
    encrypt-cookies: ${APP_JWT_ENCRYPT_COOKIES:true}
  cookie:
    domain: ${APP_COOKIE_DOMAIN:}
    secure: ${APP_COOKIE_SECURE:false}
    http-only: true
    same-site: Lax
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
    allowed-redirect-uris: ${APP_ALLOWED_REDIRECT_URIS:}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# OAuth2 Configuration
spring.security.oauth2.client:
  registration:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      scope: email,profile
      redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  provider:
    google:
      authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

# Logging Configuration
logging:
  level:
    root: INFO
    com.hgn.iam: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/iam-service.log
    max-size: 10MB
    max-history: 30

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    max-threads: 200
    min-spare-threads: 10

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs/openapi.json
  swagger-ui:
    path: /api-docs
    operations-sorter: method
    tags-sorter: alpha
