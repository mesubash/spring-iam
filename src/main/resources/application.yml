spring:
  application:
    name: iam-service
  jackson:
    deserialization:
      accept-single-value-as-array: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iam_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: IAM-HikariPool

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}  # Use Flyway for schema; override to validate if needed
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms
      timeout: 2000ms

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes default
      cache-null-values: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        authorization.check.duration: true
  prometheus:
    metrics:
      export:
        enabled: true

# Application-Specific Configuration
iam:
  authorization:
    # Cache TTL settings
    cache:
      permissions-ttl: 300  # 5 minutes (seconds)
      deny-rules-ttl: 60    # 1 minute (security-critical)
      scope-ttl: 3600       # 1 hour (changes rarely)
      role-ttl: 1800        # 30 minutes
      policy-ttl: 120       # 2 minutes

    # Audit settings
    audit:
      async: true
      batch-size: 100
      flush-interval: 5000  # 5 seconds

  audit:
    partitioning:
      enabled: true
      create-ahead-months: 2
      timezone: UTC
      cron: "0 15 0 * * *"
    retention:
      enabled: true
      months: 24
      action: DROP
      cron: "0 30 1 * * *"

    # Performance settings
    performance:
      max-authorization-time-ms: 50  # Log warning if exceeded
      enable-metrics: true

  account:
    lockout:
      max-attempts: 5
      lockout-duration-minutes: 30

  rate-limit:
    max-requests: 10        # per IP per endpoint per window
    window-seconds: 60      # sliding window
    fail-mode: open         # open (availability) | closed (reject when Redis down)

  features:
    resource-grants: false    # per-instance ReBAC grants
    groups: false             # subject groups
    service-registry: false   # per-service API keys + manifest sync
    oauth2: false             # social login (gates all OAuth beans + endpoints)
    break-glass: false        # emergency time-boxed elevation
    introspection: false      # POST /api/v1/token/introspect
    revocation-feed: false    # GET /api/v1/token/revocations

  integrity:
    fail-on-error: false      # refuse startup on broken invariants
    reconciliation-cron: "-"  # nightly closure/ltree drift check ("-" disables)

  break-glass:
    webhook-url: ${IAM_BREAK_GLASS_WEBHOOK:}   # optional alert POST on grant

  authn:
    session:
      max-per-identity: 10        # LRU eviction beyond this
      rotation-grace-seconds: 60  # rotated-token retry window before reuse = theft
    cookie:
      encryption-key: ${IAM_COOKIE_KEY:}          # independent from signing keys
    keys:
      encryption-key: ${IAM_KEY_ENCRYPTION_KEY:}  # encrypts private signing keys at rest

  security:
    # If empty, API key check is disabled
    internal-api-key: ${IAM_INTERNAL_API_KEY:}
    jwt:
      # If empty, JWT auth is disabled
      secret: ${IAM_JWT_SECRET:}
      issuer: ${IAM_JWT_ISSUER:}
      audience: ${IAM_JWT_AUDIENCE:}

# AuthN Configuration
app:
  jwt:
    # Access tokens are RS256-signed with keys from signing_keys (bootstrap-
    # generated). This secret only feeds the legacy cookie-key fallback when
    # iam.authn.cookie.encryption-key is unset.
    secret: ${APP_JWT_SECRET:changeThisToALongRandomSecretKeyForProduction}
    expiration: 900000                   # access token, 15 minutes
    refresh-expiration: 604800000        # session lifetime, 7 days
    claims-mode: ${APP_JWT_CLAIMS_MODE:roles}   # minimal | roles | permissions
    refresh-token-cookie-name: __Host-Refresh
    refresh-token-expiration-days: 7
    encrypt-cookies: ${APP_JWT_ENCRYPT_COOKIES:true}
  cookie:
    domain: ${APP_COOKIE_DOMAIN:}
    # __Host- cookies require Secure; browsers reject them otherwise.
    # Override to false only for plain-HTTP local dev (rename the cookie too).
    secure: ${APP_COOKIE_SECURE:true}
    http-only: true
    same-site: Lax
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
    allowed-redirect-uris: ${APP_ALLOWED_REDIRECT_URIS:}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# OAuth2 Configuration
# No client registration is defined by default so the app boots with
# iam.features.oauth2=false and no OAuth credentials. To enable social login,
# set iam.features.oauth2=true AND provide a registration, e.g. via env:
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=...
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=...
# Google's provider endpoints are built in; only client-id/secret are needed.

# Logging Configuration
logging:
  level:
    root: INFO
    io.github.mesubash.iam: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/iam-service.log
    max-size: 10MB
    max-history: 30

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    max-threads: 200
    min-spare-threads: 10

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs/openapi.json
  swagger-ui:
    path: /api-docs
    operations-sorter: method
    tags-sorter: alpha
