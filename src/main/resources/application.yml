spring:
  application:
    name: authorization-service

  datasource:
    url: jdbc:postgresql://localhost:5432/iam_db
    username: iam_user
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  redis:
    data:
      redis:
          host: localhost
          port: 6379
          password: ${REDIS_PASSWORD}
          lettuce:
            pool:
              max-active: 20
              max-idle: 10
              min-idle: 5
          timeout: 2000

authorization:
  cache:
    jwt-ttl: 3600              # 1 hour
    redis-ttl: 300             # 5 minutes
    redis-deny-ttl: 60         # 1 minute
  performance:
    enable-batch-loading: true
    batch-size: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8080
  compression:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 10

# Logging
logging:
  level:
    root: INFO
    com.yourcompany.auth: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"