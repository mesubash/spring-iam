services:
  postgres:
    image: postgres:16
    container_name: iam-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-iam_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - iam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: iam-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - iam_redis_data:/data

  iam-service:
    build: .
    container_name: iam-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
        - .env
    environment:
      # Override localhost values from .env with Docker network service names
      DB_HOST: postgres
      # The Postgres container still listens on 5432 inside the Docker network.
      DB_PORT: 5432
      REDIS_HOST: redis
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"

volumes:
  iam_postgres_data:
  iam_redis_data:
